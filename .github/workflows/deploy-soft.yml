name: Deploy Soft

on:
  push:
    branches:
      - main

concurrency:
  group: playground-vps-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: playground-vps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Setup buildx
        run: docker buildx create --driver docker-container --name "playground-builder-${GITHUB_RUN_ID}" --use

      - name: Build and publish release images
        shell: bash
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner=$(printf '%s' "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')
          tag="$GITHUB_SHA"

          build_and_push() {
            local name="$1"
            local dockerfile="$2"
            shift 2
            local image="ghcr.io/${owner}/automaton-playground-${name}"
            local metadata_file="$RUNNER_TEMP/${name}-metadata.json"
            docker buildx build \
              --platform linux/amd64 \
              --push \
              --metadata-file "$metadata_file" \
              -f "$dockerfile" \
              -t "${image}:${tag}" \
              -t "${image}:main" \
              "$@" \
              .
          }

          build_and_push web apps/web/Dockerfile --build-arg VITE_INDEXER_BASE_URL=
          build_and_push indexer apps/indexer/Dockerfile
          build_and_push rpc-gateway apps/rpc-gateway/Dockerfile

      - name: Write release manifest
        shell: bash
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          CHILD_WASM_URL: ${{ secrets.PLAYGROUND_CHILD_WASM_URL }}
          CHILD_WASM_SHA256: ${{ secrets.PLAYGROUND_CHILD_WASM_SHA256 }}
          CHILD_VERSION_COMMIT: ${{ secrets.PLAYGROUND_CHILD_VERSION_COMMIT }}
          FORK_BLOCK_NUMBER: ${{ vars.PLAYGROUND_FORK_BLOCK_NUMBER }}
        run: |
          set -euo pipefail
          owner=$(printf '%s' "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')
          node --input-type=module - "$RUNNER_TEMP" "$owner" "$GITHUB_SHA" <<'NODE'
          import fs from "node:fs";
          import path from "node:path";

          const [tempDir, owner, gitCommit] = process.argv.slice(2);

          function readDigest(name) {
            const metadata = JSON.parse(
              fs.readFileSync(path.join(tempDir, `${name}-metadata.json`), "utf8")
            );
            const digest = metadata["containerimage.digest"];
            if (typeof digest !== "string" || !digest.startsWith("sha256:")) {
              throw new Error(`missing registry digest for ${name}`);
            }
            return digest;
          }

          const childWasmUrl = process.env.CHILD_WASM_URL?.trim();
          const childWasmSha256 = process.env.CHILD_WASM_SHA256?.trim();
          const childVersionCommit = process.env.CHILD_VERSION_COMMIT?.trim();

          if (!childWasmUrl || !childWasmSha256 || !childVersionCommit) {
            throw new Error("PLAYGROUND_CHILD_WASM_URL, PLAYGROUND_CHILD_WASM_SHA256, and PLAYGROUND_CHILD_VERSION_COMMIT are required");
          }

          const webDigest = readDigest("web");
          const indexerDigest = readDigest("indexer");
          const rpcGatewayDigest = readDigest("rpc-gateway");
          const environmentVersion = `playground-${gitCommit.slice(0, 12)}`;
          const forkBlockNumber =
            typeof process.env.FORK_BLOCK_NUMBER === "string" && process.env.FORK_BLOCK_NUMBER.trim() !== ""
              ? Number.parseInt(process.env.FORK_BLOCK_NUMBER, 10)
              : null;

          const manifest = {
            schemaVersion: 1,
            release: {
              mode: "soft",
              gitCommit,
              environmentVersion,
              createdAt: new Date().toISOString()
            },
            images: {
              web: {
                repository: `ghcr.io/${owner}/automaton-playground-web`,
                tag: gitCommit,
                digest: webDigest,
                ref: `ghcr.io/${owner}/automaton-playground-web@${webDigest}`
              },
              indexer: {
                repository: `ghcr.io/${owner}/automaton-playground-indexer`,
                tag: gitCommit,
                digest: indexerDigest,
                ref: `ghcr.io/${owner}/automaton-playground-indexer@${indexerDigest}`
              },
              rpcGateway: {
                repository: `ghcr.io/${owner}/automaton-playground-rpc-gateway`,
                tag: gitCommit,
                digest: rpcGatewayDigest,
                ref: `ghcr.io/${owner}/automaton-playground-rpc-gateway@${rpcGatewayDigest}`
              }
            },
            childArtifact: {
              url: childWasmUrl,
              fileName: path.basename(new URL(childWasmUrl).pathname),
              sha256: childWasmSha256,
              versionCommit: childVersionCommit
            },
            fork: {
              chainId: 20260326,
              upstreamRpcUrlEnv: "LOCAL_EVM_FORK_URL",
              blockNumber: forkBlockNumber
            }
          };

          fs.writeFileSync(
            path.join(tempDir, "release-manifest.json"),
            `${JSON.stringify(manifest, null, 2)}\n`
          );
          NODE

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: soft-release-manifest
          path: ${{ runner.temp }}/release-manifest.json
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: playground-vps
    needs:
      - build-release

    steps:
      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: soft-release-manifest
          path: ${{ runner.temp }}/release-manifest

      - name: Install Tailscale
        if: ${{ secrets.PLAYGROUND_TAILSCALE_AUTHKEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Join Tailnet
        if: ${{ secrets.PLAYGROUND_TAILSCALE_AUTHKEY != '' }}
        shell: bash
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.PLAYGROUND_TAILSCALE_AUTHKEY }}
        run: |
          set -euo pipefail
          sudo tailscale up \
            --authkey="$TAILSCALE_AUTHKEY" \
            --hostname="gha-playground-${GITHUB_RUN_ID}" \
            --accept-routes=false \
            --ssh=false
          tailscale status

      - name: Prepare SSH files
        shell: bash
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.PLAYGROUND_VPS_KNOWN_HOSTS }}
          VPS_SSH_KEY: ${{ secrets.PLAYGROUND_VPS_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.PLAYGROUND_GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.PLAYGROUND_GHCR_TOKEN }}
          PLAYGROUND_ENV_FILE: /etc/automaton-playground/playground.env
          PLAYGROUND_VPS_REPO_ROOT: ${{ vars.PLAYGROUND_VPS_REPO_ROOT }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
          printf '%s\n' "$VPS_SSH_KEY" >"$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          python3 - <<'PY' >"$RUNNER_TEMP/deploy.env"
          import os, shlex
          values = {
              "GHCR_USERNAME": os.environ["GHCR_USERNAME"],
              "GHCR_TOKEN": os.environ["GHCR_TOKEN"],
              "PLAYGROUND_ENV_FILE": os.environ["PLAYGROUND_ENV_FILE"],
              "PLAYGROUND_VPS_REPO_ROOT": os.environ.get("PLAYGROUND_VPS_REPO_ROOT", ""),
          }
          for key, value in values.items():
              if value:
                  print(f"{key}={shlex.quote(value)}")
          PY

      - name: Upload manifest and deploy
        shell: bash
        env:
          VPS_HOST: ${{ secrets.PLAYGROUND_VPS_HOST }}
          VPS_PORT: ${{ secrets.PLAYGROUND_VPS_PORT }}
          VPS_USER: ${{ secrets.PLAYGROUND_VPS_USER }}
        run: |
          set -euo pipefail
          port="${VPS_PORT:-22}"
          repo_root="${PLAYGROUND_VPS_REPO_ROOT:-/srv/automaton-launchpad/current}"
          remote_manifest="/tmp/automaton-playground-release-${GITHUB_SHA}.json"
          remote_env="/tmp/automaton-playground-deploy-${GITHUB_RUN_ID}.env"
          scp -P "$port" "$RUNNER_TEMP/release-manifest/release-manifest.json" "${VPS_USER}@${VPS_HOST}:${remote_manifest}"
          scp -P "$port" "$RUNNER_TEMP/deploy.env" "${VPS_USER}@${VPS_HOST}:${remote_env}"
          ssh -p "$port" "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail; . '${remote_env}'; repo_root=\${PLAYGROUND_VPS_REPO_ROOT:-${repo_root}}; bash \"\${repo_root}/scripts/deploy-playground-release.sh\" --manifest '${remote_manifest}'; rm -f '${remote_manifest}' '${remote_env}'"

      - name: Leave Tailnet
        if: ${{ always() && secrets.PLAYGROUND_TAILSCALE_AUTHKEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo tailscale logout || true
