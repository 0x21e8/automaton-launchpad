name: Deploy Soft

on:
  push:
    branches:
      - main

concurrency:
  group: playground-vps-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-release:
    uses: ./.github/workflows/publish-playground-images.yml
    secrets: inherit

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: playground-vps
    needs:
      - build-release

    steps:
      - name: Render release manifest
        shell: bash
        env:
          RELEASE_MODE: soft
          RELEASE_GIT_COMMIT: ${{ needs.build-release.outputs.git_commit }}
          RELEASE_ENVIRONMENT_VERSION: ${{ needs.build-release.outputs.environment_version }}
          PLAYGROUND_WEB_IMAGE: ${{ needs.build-release.outputs.web_image_ref }}
          PLAYGROUND_INDEXER_IMAGE: ${{ needs.build-release.outputs.indexer_image_ref }}
          PLAYGROUND_RPC_GATEWAY_IMAGE: ${{ needs.build-release.outputs.rpc_gateway_image_ref }}
          CHILD_WASM_URL: ${{ secrets.PLAYGROUND_CHILD_WASM_URL }}
          CHILD_WASM_SHA256: ${{ secrets.PLAYGROUND_CHILD_WASM_SHA256 }}
          CHILD_VERSION_COMMIT: ${{ secrets.PLAYGROUND_CHILD_VERSION_COMMIT }}
          FORK_BLOCK_NUMBER: ${{ vars.PLAYGROUND_FORK_BLOCK_NUMBER }}
        run: |
          set -euo pipefail
          node --input-type=module - "$RUNNER_TEMP/release-manifest.json" <<'NODE'
          import fs from "node:fs";
          import path from "node:path";

          const [manifestPath] = process.argv.slice(2);

          function requireString(value, label) {
            if (typeof value !== "string" || value.trim() === "") {
              throw new Error(`${label} is required`);
            }
            return value.trim();
          }

          function parseImageRef(value, label) {
            const ref = requireString(value, label);
            const atIndex = ref.lastIndexOf("@");
            if (atIndex <= 0 || atIndex === ref.length - 1) {
              throw new Error(`${label} must be an immutable digest ref`);
            }
            const repository = ref.slice(0, atIndex);
            const digest = ref.slice(atIndex + 1);
            if (!digest.startsWith("sha256:")) {
              throw new Error(`${label} must use a sha256 digest`);
            }
            return { repository, digest, ref };
          }

          const gitCommit = requireString(process.env.RELEASE_GIT_COMMIT, "RELEASE_GIT_COMMIT");
          const environmentVersion = requireString(
            process.env.RELEASE_ENVIRONMENT_VERSION,
            "RELEASE_ENVIRONMENT_VERSION"
          );
          const webImage = parseImageRef(process.env.PLAYGROUND_WEB_IMAGE, "PLAYGROUND_WEB_IMAGE");
          const indexerImage = parseImageRef(
            process.env.PLAYGROUND_INDEXER_IMAGE,
            "PLAYGROUND_INDEXER_IMAGE"
          );
          const rpcGatewayImage = parseImageRef(
            process.env.PLAYGROUND_RPC_GATEWAY_IMAGE,
            "PLAYGROUND_RPC_GATEWAY_IMAGE"
          );
          const childWasmUrl = requireString(process.env.CHILD_WASM_URL, "CHILD_WASM_URL");
          const childWasmSha256 = requireString(process.env.CHILD_WASM_SHA256, "CHILD_WASM_SHA256");
          const childVersionCommit = requireString(
            process.env.CHILD_VERSION_COMMIT,
            "CHILD_VERSION_COMMIT"
          );

          const forkBlockNumberValue =
            typeof process.env.FORK_BLOCK_NUMBER === "string" &&
            process.env.FORK_BLOCK_NUMBER.trim() !== ""
              ? Number.parseInt(process.env.FORK_BLOCK_NUMBER, 10)
              : null;

          const manifest = {
            schemaVersion: 1,
            release: {
              mode: process.env.RELEASE_MODE?.trim() || "soft",
              gitCommit,
              environmentVersion,
              createdAt: new Date().toISOString()
            },
            images: {
              web: {
                repository: webImage.repository,
                tag: gitCommit,
                digest: webImage.digest,
                ref: webImage.ref
              },
              indexer: {
                repository: indexerImage.repository,
                tag: gitCommit,
                digest: indexerImage.digest,
                ref: indexerImage.ref
              },
              rpcGateway: {
                repository: rpcGatewayImage.repository,
                tag: gitCommit,
                digest: rpcGatewayImage.digest,
                ref: rpcGatewayImage.ref
              }
            },
            childArtifact: {
              url: childWasmUrl,
              fileName: path.basename(new URL(childWasmUrl).pathname),
              sha256: childWasmSha256,
              versionCommit: childVersionCommit
            },
            fork: {
              chainId: 20260326,
              upstreamRpcUrlEnv: "LOCAL_EVM_FORK_URL",
              blockNumber: forkBlockNumberValue
            }
          };

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Install Tailscale
        if: ${{ secrets.PLAYGROUND_TAILSCALE_AUTHKEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Join Tailnet
        if: ${{ secrets.PLAYGROUND_TAILSCALE_AUTHKEY != '' }}
        shell: bash
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.PLAYGROUND_TAILSCALE_AUTHKEY }}
        run: |
          set -euo pipefail
          sudo tailscale up \
            --authkey="$TAILSCALE_AUTHKEY" \
            --hostname="gha-playground-${GITHUB_RUN_ID}" \
            --accept-routes=false \
            --ssh=false
          tailscale status

      - name: Prepare SSH files
        shell: bash
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.PLAYGROUND_VPS_KNOWN_HOSTS }}
          VPS_SSH_KEY: ${{ secrets.PLAYGROUND_VPS_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.PLAYGROUND_GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.PLAYGROUND_GHCR_TOKEN }}
          PLAYGROUND_ENV_FILE: /etc/automaton-playground/playground.env
          PLAYGROUND_VPS_REPO_ROOT: ${{ vars.PLAYGROUND_VPS_REPO_ROOT }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
          printf '%s\n' "$VPS_SSH_KEY" >"$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          python3 - <<'PY' >"$RUNNER_TEMP/deploy.env"
          import os, shlex
          values = {
              "GHCR_USERNAME": os.environ["GHCR_USERNAME"],
              "GHCR_TOKEN": os.environ["GHCR_TOKEN"],
              "PLAYGROUND_ENV_FILE": os.environ["PLAYGROUND_ENV_FILE"],
              "PLAYGROUND_VPS_REPO_ROOT": os.environ.get("PLAYGROUND_VPS_REPO_ROOT", ""),
          }
          for key, value in values.items():
              if value:
                  print(f"{key}={shlex.quote(value)}")
          PY

      - name: Upload manifest and deploy
        shell: bash
        env:
          VPS_HOST: ${{ secrets.PLAYGROUND_VPS_HOST }}
          VPS_PORT: ${{ secrets.PLAYGROUND_VPS_PORT }}
          VPS_USER: ${{ secrets.PLAYGROUND_VPS_USER }}
        run: |
          set -euo pipefail
          port="${VPS_PORT:-22}"
          repo_root="${PLAYGROUND_VPS_REPO_ROOT:-/srv/automaton-launchpad/current}"
          remote_manifest="/tmp/automaton-playground-release-${GITHUB_SHA}.json"
          remote_env="/tmp/automaton-playground-deploy-${GITHUB_RUN_ID}.env"
          scp -P "$port" "$RUNNER_TEMP/release-manifest.json" "${VPS_USER}@${VPS_HOST}:${remote_manifest}"
          scp -P "$port" "$RUNNER_TEMP/deploy.env" "${VPS_USER}@${VPS_HOST}:${remote_env}"
          ssh -p "$port" "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail; . '${remote_env}'; repo_root=\${PLAYGROUND_VPS_REPO_ROOT:-${repo_root}}; bash \"\${repo_root}/scripts/deploy-playground-release.sh\" --manifest '${remote_manifest}'; rm -f '${remote_manifest}' '${remote_env}'"

      - name: Leave Tailnet
        if: ${{ always() && secrets.PLAYGROUND_TAILSCALE_AUTHKEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo tailscale logout || true
